<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск фильмов</title>
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding:30px 15px; margin:0; }
        input { width:100%; max-width:580px; padding:18px; font-size:19px; border-radius:12px; border:none; margin:12px 0; }
        button { width:100%; max-width:580px; padding:18px; font-size:20px; background:#e50914; color:white; border:none; border-radius:12px; margin:10px 0; font-weight:bold; }
    </style>
</head>
<body>
    <h1>Поиск фильмов</h1>
    
    <input type="text" id="search" placeholder="Название фильма" onkeydown="if(event.key === 'Enter') searchMovie()" />
    <button onclick="searchMovie()">Найти на Кинопоиске</button>

    <script>
    function searchMovie() {
        let name = document.getElementById("search").value.trim();
        if (!name) return;

        // Поиск с точным совпадением названия
        let query = 'site:kinopoisk.ru "' + name + '"';
        let url = "https://www.google.com/search?q=" + encodeURIComponent(query);
        
        window.open(url, "_blank");
    }
    </script>
</body>
</html>
