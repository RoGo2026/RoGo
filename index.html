<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск фильмов</title>
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding-top:100px; }
        input { width:500px; padding:18px; font-size:22px; border-radius:10px; border:none; }
        button { padding:18px 35px; font-size:22px; background:#e50914; color:white; border:none; border-radius:10px; cursor:pointer; }
    </style>
</head>
<body>
    <h1>Поиск фильмов</h1>
    
    <input type="text" id="film" placeholder="Название фильма" onkeydown="if(event.key === 'Enter') openMovie()" />
    <button onclick="openMovie()">Найти фильм</button>

    <script>
    async function openMovie() {
        let name = document.getElementById("film").value.trim();
        if (!name) return;

        let searchUrl = "https://www.kinopoisk.ru/index.php?kp_query=" + encodeURIComponent(name);
        
        try {
            let res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(searchUrl));
            let data = await res.json();
            let html = data.contents;

            let match = html.match(/href="\/film\/(\d+)\/"/);
            if (match) {
                let filmUrl = `https://www.kinopoisk.net/film/${match[1]}/`;
                window.open(filmUrl, "_blank");
            } else {
                window.open(searchUrl, "_blank");
            }
        } catch(e) {
            window.open(searchUrl, "_blank");
        }
    }
    </script>
</body>
</html>
