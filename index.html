<body>
    <h1>Поиск фильмов</h1>
    
    <input type="text" id="search" placeholder="Название фильма"
           onkeydown="if(event.key === 'Enter') openSearch()" />
    <button onclick="openSearch()">Открыть поиск</button>

    <h2>Или вставь ссылку с Кинопоиска</h2>
    <input type="text" id="link" placeholder="https://www.kinopoisk.ru/film/XXXXXX/" />
    <button onclick="changeDomain()">Открыть с плеером</button>

    <!-- КНОПКА ПЕРЕМЕЩЕНА СЮДА -->
    <br>
    <button onclick="pasteAndOpen()" class="big-btn">
        Вставить из буфера обмена и открыть
    </button>
</body>
