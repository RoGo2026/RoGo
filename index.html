<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск фильмов</title>
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding:25px 15px; margin:0; }
        h1 { margin:0 0 25px 0; }
        input { 
            width:100%; 
            max-width:580px; 
            padding:18px; 
            font-size:19px; 
            border-radius:12px; 
            border:none; 
            margin:12px 0;
        }
        button { 
            width:100%; 
            max-width:580px; 
            padding:18px; 
            font-size:20px; 
            background:#e50914; 
            color:white; 
            border:none; 
            border-radius:12px; 
            margin:8px 0; 
            font-weight:bold;
        }
        .paste-btn { background:#0066cc; }
        .instruction { margin-top:50px; font-size:16px; opacity:0.85; line-height:1.6; }
    </style>
</head>
<body>

    <h1>Поиск фильмов</h1>
    
    <input type="text" id="search" placeholder="Название фильма" onkeydown="if(event.key === 'Enter') openSearch()" />
    <button onclick="openSearch()">Открыть поиск</button>

    <h2>Или вставь ссылку с Кинопоиска</h2>
    <input type="text" id="link" placeholder="https://www.kinopoisk.ru/film/..." />

    <button onclick="changeDomain()">Открыть с плеером</button>
    <button onclick="pasteFromClipboard()" class="paste-btn">📋 Вставить из буфера и открыть</button>

    <div class="instruction">
        На ТВ-приставке и некоторых телефонах кнопка буфера может не работать.<br>
        В этом случае просто вставьте ссылку вручную в поле выше.
    </div>

    <script>
    function openSearch() {
        let name = document.getElementById("search").value.trim();
        if (name) {
            window.open("https://www.kinopoisk.ru/index.php?kp_query=" + encodeURIComponent(name), "_blank");
        }
    }

    function changeDomain() {
        let url = document.getElementById("link").value.trim();
        if (url) {
            let newUrl = url.replace("kinopoisk.ru", "kinopoisk.net");
            window.open(newUrl, "_blank");
        }
    }

    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            if (text.includes("kinopoisk")) {
                let newUrl = text.replace("kinopoisk.ru", "kinopoisk.net");
                window.open(newUrl, "_blank");
            } else if (text) {
                document.getElementById("link").value = text;
                alert("Ссылка вставлена. Нажмите «Открыть с плеером»");
            }
        } catch (e) {
            alert("Не удалось прочитать буфер обмена.\n\nВставьте ссылку вручную в поле выше.");
        }
    }
    </script>
</body>
</html>
